<!DOCTYPE html>
<!--
  KORTC — Song Pick console (redesigned interaction model)
  ---------------------------------------------------------------------------
  Single-file, no build step. React 18 + htm (JSX-like) loaded from esm.sh so
  the existing aiohttp backend can serve it at /console with zero changes.

  Interaction model (redesigned, not a 1:1 port of the old two-tab console):
    * No tabs. One "Browse" screen is always shown.
    * The queue is always present: a pinned mini-player (mobile) that expands
      into a full player/queue sheet, or a persistent side "Stage" panel
      (tablet/desktop). You never switch away to see what's playing.
    * Strong visual cues: numbered line positions (#1, #2 ...), add-feedback
      that shows where the song landed, a pulsing queue badge, labeled
      actions ("Play next" / "Remove") instead of cryptic icons, animated
      now-playing, and guided empty states.

  Backend contract (unchanged):
    POST /op      query | add | top | remove | skip | replay
    GET  /vocal   toggle vocal/accompaniment -> "True" | "False"
    GET  /singers -> ["singer", ...]
    GET  /i18n-{lang}.json
    WS   /ws      live queue: [[id,name,singer,file], ...] (idx 0 = now playing)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6d28d9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>KORTC</title>
  <style>
    :root {
      --bg: #f4f5fb; --bg-2: #eceef7;
      --surface: #ffffff; --surface-2: #f6f7fc;
      --text: #16161d; --text-dim: #6b7280; --text-faint: #9aa1ad;
      --border: #ececf2;
      --accent: #6d28d9; --accent-2: #db2777; --accent-soft: rgba(109,40,217,0.10);
      --good: #10b981; --danger: #ef4444;
      --radius: 18px; --radius-sm: 13px;
      --shadow: 0 6px 24px rgba(20,16,40,0.08);
      --shadow-lg: 0 18px 48px rgba(20,16,40,0.20);
      --rail: 88px; --stage-w: 400px;
      --grad: linear-gradient(135deg, #7c3aed 0%, #6d28d9 42%, #db2777 100%);
      --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left); --sar: env(safe-area-inset-right);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e14; --bg-2: #14141d;
        --surface: #1a1a24; --surface-2: #20202c;
        --text: #f3f3f7; --text-dim: #a4a8b4; --text-faint: #6c707d;
        --border: #282834;
        --accent: #a78bfa; --accent-2: #f472b6; --accent-soft: rgba(167,139,250,0.15);
        --shadow: 0 6px 24px rgba(0,0,0,0.4); --shadow-lg: 0 18px 48px rgba(0,0,0,0.6);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    /* Mobile uses document-level scrolling (no fixed shell) so iOS Safari can
       auto-hide its address bar on scroll. The desktop media query below
       restores the locked 100dvh shell with inner scroll panes. */
    body {
      margin: 0; background: var(--bg); color: var(--text); min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    #root { min-height: 100%; }
    button { font-family: inherit; }

    /* ---------------- shell ---------------- */
    .app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

    .topbar {
      position: relative; z-index: 30; display: flex; align-items: center; gap: 12px;
      padding: calc(var(--sat) + 13px) 16px 13px calc(var(--sal) + 16px);
      background: var(--grad); color: #fff;
      box-shadow: 0 4px 20px rgba(109,40,217,0.25);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; letter-spacing: 0.3px; }
    .brand .logo { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center;
      background: rgba(255,255,255,0.18); font-size: 18px; }
    .brand .sub { font-size: 11.5px; font-weight: 500; opacity: 0.82; margin-top: 1px; }
    .topbar .spacer { flex: 1; }
    .icon-btn {
      border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.16); color: #fff; font-size: 18px; display: grid; place-items: center;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.28); }
    .icon-btn:active { transform: scale(0.92); }

    .content { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    /* browse column — grows with content (document scroll) on mobile.
       Bottom padding only clears the mini-player pill (not the whole dock), so
       the list flows down under the dock's gradient fade toward the address bar. */
    .browse { flex: 1; min-height: 0;
      padding: 16px calc(var(--sal) + 16px) calc(var(--sab) + 86px) calc(var(--sar) + 16px); }

    /* ---------------- search ---------------- */
    .search-head { position: sticky; top: -16px; z-index: 12;
      margin: -16px -4px 14px; padding: 16px 4px 12px;
      background: linear-gradient(var(--bg) 80%, transparent); }
    .search-fields { display: flex; flex-direction: column; gap: 10px; }
    .field { position: relative; }
    .field .fi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-faint); pointer-events: none; }
    .field input {
      width: 100%; height: 52px; padding: 0 44px 0 42px;
      border: 1.5px solid var(--border); border-radius: 14px; background: var(--surface);
      color: var(--text); font-size: 16px; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field input::placeholder { color: var(--text-faint); }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .field .clear-x { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 30px; height: 30px; border: none; cursor: pointer; border-radius: 50%;
      background: var(--surface-2); color: var(--text-dim); font-size: 14px; display: grid; place-items: center; }
    .ac-list { position: absolute; left: 0; right: 0; top: calc(100% + 6px); z-index: 40;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: var(--shadow-lg); max-height: 46vh; overflow-y: auto; padding: 6px; }
    .ac-item { padding: 11px 12px; border-radius: 10px; cursor: pointer; font-size: 15px; color: var(--text);
      display: flex; align-items: center; gap: 10px; }
    .ac-item:hover { background: var(--accent-soft); color: var(--accent); }
    .ac-item .fi { font-size: 14px; color: var(--text-faint); }
    .toolbar { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .chip { border: 1.5px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text-dim);
      height: 38px; border-radius: 19px; padding: 0 14px; font-size: 13.5px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip:active { transform: scale(0.96); }

    /* category switcher (Songs / Singers / YouTube) */
    .seg { display: flex; gap: 4px; background: var(--surface-2); border-radius: 14px; padding: 4px; margin-bottom: 14px; }
    .seg button { flex: 1; border: none; background: none; cursor: pointer; height: 42px; border-radius: 11px;
      font-size: 13.5px; font-weight: 700; color: var(--text-dim); display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.2s ease, color 0.2s ease; }
    .seg button .si { font-size: 16px; }
    .seg button.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }
    @media (max-width: 380px) { .seg button .sl { display: none; } }

    /* breadcrumb when viewing a singer's songs */
    .crumb { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .back-chip { border: 1.5px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer;
      height: 42px; border-radius: 21px; padding: 0 16px; font-size: 14px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 6px; flex: none; transition: all 0.2s ease; }
    .back-chip:hover { border-color: var(--accent); color: var(--accent); }
    .crumb .crumb-name { font-size: 17px; font-weight: 800; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* YouTube affordances */
    .yt-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 800; color: #fff;
      background: #f00; padding: 1px 6px; border-radius: 6px; margin-left: 7px; vertical-align: middle; }
    .chev { flex: none; color: var(--text-faint); font-size: 22px; line-height: 1; }
    .cta { border: none; cursor: pointer; width: 100%; border-radius: 16px; padding: 16px; font-size: 15px; font-weight: 800; color: #fff;
      background: linear-gradient(135deg, #ff4d4d, #e60000); box-shadow: 0 8px 24px rgba(230,0,0,0.30);
      display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.1s ease; }
    .cta:active { transform: scale(0.97); }
    .cta .yi { font-size: 20px; }
    .singer-hint { text-align: center; color: var(--text-faint); font-size: 12.5px; padding: 12px; }

    /* singer picker — grid of avatar cards */
    .singer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 12px; }
    .singer-card { display: flex; flex-direction: column; align-items: center; gap: 9px;
      padding: 14px 6px; border-radius: 16px; background: var(--surface); box-shadow: var(--shadow);
      cursor: pointer; transition: transform 0.12s ease, box-shadow 0.2s ease; animation: rowIn 0.28s ease both; }
    .singer-card:hover { box-shadow: var(--shadow-lg); }
    .singer-card:active { transform: scale(0.95); }
    .sg-avatar { width: 60px; height: 60px; border-radius: 50%; overflow: hidden; display: grid; place-items: center;
      color: #fff; font-size: 24px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15); }
    .sg-name { width: 100%; text-align: center; font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    @media screen and (min-width: 768px) { .singer-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 14px; } .sg-avatar { width: 72px; height: 72px; } }

    /* search header shrinks as you scroll down for a tighter layout */
    .search-head .field input, .search-head .seg, .search-head .seg button {
      transition: height 0.22s ease, padding 0.22s ease, margin 0.22s ease, font-size 0.22s ease; }
    .search-head.compact { padding-top: 10px; padding-bottom: 6px; }
    .search-head.compact .seg { margin-bottom: 9px; padding: 3px; }
    .search-head.compact .seg button { height: 34px; font-size: 12.5px; }
    .search-head.compact .seg button .si { font-size: 14px; }
    .search-head.compact .search-fields { gap: 8px; }
    .search-head.compact .field input { height: 42px; font-size: 15px; }

    .section-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); margin: 4px 4px 12px; }
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }

    .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      border-bottom: 1px solid var(--border); animation: rowIn 0.28s ease both; }
    .row:last-child { border-bottom: none; }
    @keyframes rowIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .thumb { flex: none; width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center;
      color: #fff; font-size: 18px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15); }
    /* real artist/album artwork fills the placeholder; emoji shows underneath until it loads */
    .thumb, .np .np-art, .mini .m-art { overflow: hidden; }
    .av-img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; animation: avIn 0.35s ease; }
    @keyframes avIn { from { opacity: 0; } to { opacity: 1; } }
    .meta { min-width: 0; flex: 1; }
    .meta .name { font-size: 15.5px; font-weight: 650; color: var(--text); display: flex; align-items: center; gap: 6px; min-width: 0; }
    /* marquee: long titles float left and right so they can be read in full */
    .mq { flex: 1 1 auto; min-width: 0; display: block; overflow: hidden; white-space: nowrap; }
    .mq-i { display: inline-block; white-space: nowrap; }
    .mq-i.run { animation: marquee var(--mq) ease-in-out infinite alternate; will-change: transform; }
    @keyframes marquee { 0%, 16% { transform: translateX(0); } 84%, 100% { transform: translateX(var(--shift)); } }
    @media (prefers-reduced-motion: reduce) { .mq-i.run { animation: none; } }
    .meta .singer { font-size: 13px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* add button + queued-position state */
    .add-btn { flex: none; border: none; cursor: pointer; height: 38px; min-width: 84px; border-radius: 19px; padding: 0 16px;
      font-size: 14px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--accent); color: #fff; transition: transform 0.1s ease, background 0.2s ease; }
    .add-btn:active { transform: scale(0.92); }
    .add-btn.queued { background: var(--accent-soft); color: var(--accent); cursor: default; }
    .add-btn.playing-now { background: rgba(16,185,129,0.14); color: var(--good); cursor: default; }
    .pos-badge { display: inline-grid; place-items: center; min-width: 22px; height: 22px; padding: 0 6px;
      border-radius: 11px; background: currentColor; font-size: 12.5px; font-weight: 800; }
    .pos-badge span { color: var(--surface); }

    /* ---------------- stage (now playing + queue) ---------------- */
    .stage { display: flex; flex-direction: column; min-height: 0; }
    /* the fixed parts never shrink — only the up-next list absorbs space, so a
       long queue can't squeeze/clip the now-playing card */
    .stage > .np, .stage > .controls, .stage > .section-title { flex-shrink: 0; }
    .np { position: relative; border-radius: var(--radius); padding: 20px; color: #fff;
      box-shadow: var(--shadow-lg); overflow: hidden; background: var(--grad); }
    .np::after { content: ""; position: absolute; inset: 0;
      background: radial-gradient(120% 90% at 100% 0%, rgba(255,255,255,0.25), transparent 60%); pointer-events: none; }
    .np .np-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; opacity: 0.92; margin-bottom: 12px; }
    .np .np-row { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
    .np .np-art { flex: none; width: 62px; height: 62px; border-radius: 16px; background: rgba(255,255,255,0.18); display: grid; place-items: center; font-size: 27px; }
    .np .np-name { font-size: 21px; font-weight: 800; line-height: 1.2; word-break: break-word; }
    .np .np-singer { font-size: 14px; opacity: 0.88; margin-top: 4px; }

    .eq { display: inline-flex; align-items: flex-end; gap: 3px; height: 15px; }
    .eq i { width: 3px; background: currentColor; border-radius: 2px; animation: eq 0.9s ease-in-out infinite; }
    .eq i:nth-child(1){ height: 40%; animation-delay: -0.4s; }
    .eq i:nth-child(2){ height: 90%; animation-delay: -0.2s; }
    .eq i:nth-child(3){ height: 60%; animation-delay: -0.6s; }
    .eq i:nth-child(4){ height: 100%; animation-delay: 0s; }
    @keyframes eq { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
    @media (prefers-reduced-motion: reduce) { .eq i { animation: none; } }

    /* control cluster */
    .controls { display: flex; gap: 10px; margin-top: 14px; }
    .ctl { flex: 1; border: none; cursor: pointer; height: 56px; border-radius: 15px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      background: var(--surface-2); color: var(--text); transition: transform 0.1s ease, background 0.2s ease, color 0.2s ease; }
    .ctl .ci { font-size: 19px; }
    .ctl .cl { font-size: 11px; font-weight: 600; opacity: 0.85; }
    .ctl:active { transform: scale(0.95); }
    .ctl:disabled { opacity: 0.4; cursor: default; }
    .ctl.warn { background: rgba(239,68,68,0.12); color: var(--danger); }
    .ctl.on { background: var(--good); color: #fff; }

    /* up-next list: a non-scrolling zone that clips the scroller + the end label */
    .upnext-zone { flex: 1; min-height: 0; margin-top: 18px; position: relative; overflow: hidden;
      display: flex; flex-direction: column; }
    .upnext { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      /* kill the native rubber-band so a fast fling just clamps (no stuck overscroll) */
      overscroll-behavior: none; }
    /* hide the scroll indicator while overscrolling (during the reveal) */
    .upnext.overscrolling { scrollbar-width: none; -ms-overflow-style: none; }
    .upnext.overscrolling::-webkit-scrollbar { width: 0; height: 0; display: none; }
    .upnext-content { min-height: 100%; }
    /* "end of list" is anchored to the non-scrolling ZONE (a sibling of the
       scroller), parked below the viewport. Since it's outside the scroller it
       never adds to scrollHeight — native scroll can't reach it; only the
       rubber-band pull slides it (and the content) into view. */
    .upnext-end { position: absolute; left: 0; right: 0; bottom: 0; height: 52px;
      transform: translateY(52px); background: var(--bg); z-index: 1;
      display: flex; align-items: center; justify-content: center; gap: 10px; pointer-events: none;
      color: var(--text-faint); font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }
    .upnext-end::before, .upnext-end::after { content: ""; width: 22px; height: 1px; background: var(--border); }
    .q-row { display: flex; align-items: center; gap: 12px; padding: 11px 6px; border-bottom: 1px solid var(--border);
      animation: rowIn 0.28s ease both; }
    .q-row:last-child { border-bottom: none; }
    .q-pos { flex: none; width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center;
      background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: 15px; }
    .q-actions { display: flex; gap: 6px; }
    .q-btn { border: none; cursor: pointer; height: 34px; border-radius: 11px; padding: 0 11px; font-size: 12.5px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); color: var(--text-dim);
      transition: transform 0.1s ease, background 0.2s ease, color 0.2s ease; }
    .q-btn:hover { background: var(--accent-soft); color: var(--accent); }
    .q-btn.danger:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .q-btn:active { transform: scale(0.93); }
    .q-btn .ql { }
    @media (max-width: 420px) { .q-btn .ql { display: none; } .q-btn { padding: 0 10px; } }

    /* ---------------- mini player (mobile) ---------------- */
    /* Fixed bottom dock: fades page content out behind the floating pill and
       reserves the safe-area inset so nothing hides under the home indicator /
       Safari toolbar. Only the pill is interactive; taps pass through the fade. */
    .mini-dock { position: fixed; left: 0; right: 0; bottom: 0; z-index: 35;
      padding: 24px 10px calc(var(--sab) + 10px);
      /* light fade so the list stays visible flowing down toward the address bar,
         while the glass pill (which blurs whatever is behind it) still stands out */
      background: linear-gradient(to top, var(--bg) 34%, transparent);
      pointer-events: none; }
    /* Liquid-glass mini-player with an animated glowing accent outline. */
    .mini { position: relative; pointer-events: auto;
      display: flex; align-items: center; gap: 12px; padding: 11px 13px;
      border-radius: 22px; cursor: pointer; overflow: visible;
      /* frosted translucent fill + top specular sheen */
      background:
        linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0.05) 55%),
        color-mix(in srgb, var(--surface) 55%, transparent);
      backdrop-filter: blur(22px) saturate(185%);
      -webkit-backdrop-filter: blur(22px) saturate(185%);
      border: 1px solid rgba(255,255,255,0.30);
      animation: miniGlow 3.2s ease-in-out infinite;
      transition: transform 0.18s ease; }
    /* gradient ring drawn with a masked border so the outline itself is colorful */
    .mini::before { content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2) 50%, var(--accent));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none; opacity: 0.85; }
    .mini > * { position: relative; z-index: 1; }
    .mini:active { transform: scale(0.985); }
    .mini.bump { animation: bump 0.5s ease, miniGlow 3.2s ease-in-out infinite; }
    @keyframes bump { 0%,100% { transform: none; } 30% { transform: translateY(-5px) scale(1.01); } }
    /* the panel collapses into the pill: a clean slide-up from below (no bounce) */
    .mini.minimizing { animation: miniMinimize 0.36s cubic-bezier(0.16,1,0.3,1), miniGlow 3.2s ease-in-out infinite; }
    @keyframes miniMinimize {
      from { transform: translateY(115%); opacity: 0.6; }
      to   { transform: none; opacity: 1; }
    }
    /* breathing outer glow in the brand colors */
    @keyframes miniGlow {
      0%,100% { box-shadow: 0 0 16px rgba(124,58,237,0.40), 0 0 2px rgba(124,58,237,0.5),
                  0 10px 32px rgba(20,16,40,0.22), inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -10px 22px rgba(255,255,255,0.05); }
      50%     { box-shadow: 0 0 32px rgba(219,39,119,0.48), 0 0 3px rgba(219,39,119,0.55),
                  0 12px 38px rgba(20,16,40,0.24), inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -10px 22px rgba(255,255,255,0.05); }
    }
    @media (prefers-reduced-motion: reduce) {
      .mini { animation: none;
        box-shadow: 0 0 22px rgba(124,58,237,0.40), 0 10px 32px rgba(20,16,40,0.22), inset 0 1px 0 rgba(255,255,255,0.55); }
      .mini.bump { animation: none; }
    }

    // Map HTML-style attrs (class/for) to React props so the `class=` markup works.
    function h(type, props, ...children) {
      if (props) {
        if ('class' in props) { props.className = props.class; delete props.class; }
        if ('for' in props) { props.htmlFor = props.for; delete props.for; }

    const html = htm.bind(h);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ------------------------------ helpers ------------------------------ */
    const api = {
      async op(payload) {
        const r = await fetch('/op', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        return r.json();
      },
      async singers() { try { return await (await fetch('/singers')).json(); } catch { return []; } },
      async vocal() { const t = await (await fetch('/vocal')).text(); return t.trim().toLowerCase() === 'true'; },
    };

    function gradientFor(str) {
      let hsh = 0;
      for (let i = 0; i < (str || '').length; i++) hsh = (hsh * 31 + str.charCodeAt(i)) % 360;
      return `linear-gradient(135deg, hsl(${hsh} 70% 58%), hsl(${(hsh + 50) % 360} 72% 48%))`;
    }
    const SINGER_PAGE = 60;   // singer grid: initial count and infinite-scroll increment
    const NOTES = ['🎵', '🎶', '🎤', '🎧', '🎙️', '💿', '🎼'];
    const noteFor = (str) => { let s = 0; for (let i = 0; i < (str || '').length; i++) s = (s + str.charCodeAt(i)) % NOTES.length; return NOTES[s]; };
    const getCookie = (k) => { const m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)')); return m ? decodeURIComponent(m[1]) : null; };
    const ordinal = (n) => { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); };

    /* ---------------------------- artist avatars ---------------------------
       Resolve a singer name to a real artist/album image via JSONP (no CORS,
       no backend change): Deezer artist photo first, then iTunes album art,
       else null -> emoji fallback. Results cached in memory + localStorage. */
    const firstSinger = (s) => (s || '').split(/[_&＆、/]/)[0].trim();
    const isYtb = (s) => /\(YTB\)/i.test(s || '');
    const stripYtb = (s) => (s || '').replace(/\s*\(YTB\)\s*$/i, '').trim();
    // Detect a pasted YouTube link in a search box and normalise it to a canonical
    // watch URL, so we can jump straight into the "add from YouTube" review step.
    const YT_URL_RE = /(?:youtube\.com\/(?:watch\?(?:[^\s]*&)?v=|shorts\/|embed\/|live\/|v\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/i;
    const matchYoutubeUrl = (s) => { const m = (s || '').match(YT_URL_RE); return m ? `https://www.youtube.com/watch?v=${m[1]}` : null; };
    const avatarMem = new Map();      // key -> url string | '' (resolved, '' = none)
    const avatarPending = new Map();  // key -> in-flight Promise (dedupe)
    let jsonpSeq = 0;
    function jsonp(build) {
      return new Promise((resolve) => {
        const cb = '__avcb_' + (++jsonpSeq);
        const s = document.createElement('script');
        let done = false;
        const fin = (v) => { if (done) return; done = true; clearTimeout(tm); try { delete window[cb]; } catch {} s.remove(); resolve(v); };
        const tm = setTimeout(() => fin(null), 8000);
        window[cb] = (data) => fin(data);
        s.onerror = () => fin(null);
        s.src = build(cb);
        document.head.appendChild(s);
      });
    }
    const deezerAvatar = (name) => jsonp((cb) =>
      `https://api.deezer.com/search/artist?q=${encodeURIComponent(name)}&limit=1&output=jsonp&callback=${cb}`)
      .then((d) => { const a = d && d.data && d.data[0]; const pic = a && (a.picture_medium || a.picture_big || a.picture);
        return pic && !pic.includes('/artist//') ? pic : null; }).catch(() => null);
    const itunesAvatar = (name) => jsonp((cb) =>
      `https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=album&limit=1&callback=${cb}`)
      .then((d) => { const a = d && d.results && d.results[0]; const art = a && a.artworkUrl100;
        return art ? art.replace('100x100bb', '300x300bb').replace('100x100', '300x300') : null; }).catch(() => null);
    function resolveAvatar(key) {
      if (avatarMem.has(key)) return Promise.resolve(avatarMem.get(key));
      let cached = null; try { cached = localStorage.getItem('av:' + key); } catch {}
      if (cached) { avatarMem.set(key, cached); return Promise.resolve(cached); }
      if (avatarPending.has(key)) return avatarPending.get(key);
      const p = (async () => {
        const url = (await deezerAvatar(key)) || (await itunesAvatar(key)) || '';
        avatarMem.set(key, url);
        if (url) { try { localStorage.setItem('av:' + key, url); } catch {} }
        avatarPending.delete(key);
        return url;
      })();
      avatarPending.set(key, p);
      return p;
    }

    // UI strings not present in the backend i18n files.
    const EXTRA = {
      en: {

        confirm_skip: 'Skip', cancel: 'Cancel', reset: 'Reset', next_short: 'Next',
        mode_songs: 'Songs', mode_singers: 'Singers', mode_ytb: 'YouTube',
        singer_search_ph: 'Search a singer', pick_singer: 'Pick a singer', singers_count: 'singers',
        singers_none: 'No singers found', singers_none_sub: 'Try a different name or initials.',
        view_songs: 'View songs', back: 'Back', songs_by: 'Songs', singer_keep_typing: 'Keep typing to narrow down…',
        ytb_search_ph: 'Search YouTube songs', add_from_yt: 'Add from YouTube',
        ytb_empty_t: 'Not in the library yet', ytb_empty_sub: "Can't find your song? Add it straight from YouTube.",
