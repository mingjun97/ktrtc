    /* -------------------------------- i18n -------------------------------- */
    function useI18n() {
      const [lang, setLang] = useState(getCookie('lang') || 'en');
      const [dict, setDict] = useState({});
      useEffect(() => {
        let ok = true;
        fetch(`/i18n-${lang}.json`).then((r) => r.json()).then((d) => { if (ok) setDict(d); }).catch(() => {});
        document.documentElement.lang = lang;
        return () => { ok = false; };
      }, [lang]);
      const extra = EXTRA[lang] || EXTRA.en;
      const t = useCallback((k) => dict[k] || extra[k] || k, [dict, extra]);
      const changeLang = useCallback((l) => { document.cookie = `lang=${l}; path=/; max-age=31536000`; setLang(l); }, []);
      return { lang, t, changeLang };
    }

    /* ------------------------------- queue -------------------------------- */
    function useQueue() {
      const [queue, setQueue] = useState([]);
      useEffect(() => {
        let ws, timer, closed = false;
        const connect = () => {
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          ws = new WebSocket(`${proto}://${location.host}/ws`);
          ws.onopen = () => ws.send('list');
          ws.onmessage = (e) => { try { setQueue(JSON.parse(e.data)); } catch {} };
          ws.onclose = () => { if (!closed) timer = setTimeout(connect, 1000); };
          ws.onerror = () => { try { ws.close(); } catch {} };
        };
        connect();
        return () => { closed = true; clearTimeout(timer); try { ws && ws.close(); } catch {} };
      }, []);
      return queue;
    }

    /* ------------------------------ Toasts -------------------------------- */
    function Toasts({ items }) {
      return html`<div class="toasts">
        ${items.map((t) => html`<div key=${t.id} class=${'toast ' + (t.kind || '')}><span>${t.icon || '✓'}</span><span>${t.msg}</span></div>`)}
      </div>`;
    }

    /* ------------------------------ Marquee ------------------------------- */
    // Renders text that gently floats left-and-right only when it overflows.
    function Marquee({ text }) {
      const wrapRef = useRef(null);
      const [shift, setShift] = useState(0);
      useEffect(() => {
        let raf;
        const measure = () => {
          const w = wrapRef.current; if (!w) return;
          const inner = w.firstElementChild; if (!inner) return;
          const diff = inner.scrollWidth - w.clientWidth;
          setShift(diff > 4 ? diff : 0);
        };
        measure();
        const tid = setTimeout(measure, 60);              // re-measure after layout/fonts settle
        raf = requestAnimationFrame(measure);
        window.addEventListener('resize', measure);
        return () => { clearTimeout(tid); cancelAnimationFrame(raf); window.removeEventListener('resize', measure); };
      }, [text]);
      const style = shift ? { '--shift': `-${shift}px`, '--mq': `${Math.max(5, shift / 28)}s` } : undefined;
      return html`<span class="mq" ref=${wrapRef}>
        <span class=${'mq-i' + (shift ? ' run' : '')} style=${style}>${text}</span>
      </span>`;
    }

    /* ------------------------------ Avatar -------------------------------- */
    // Shows the emoji fallback immediately, then swaps in the artist artwork.
    function Avatar({ singer, seed, cls, bg }) {
      const fb = seed || singer || '';
      const key = firstSinger(singer || '');
      const [url, setUrl] = useState(() => (key && avatarMem.get(key)) || '');
      const [err, setErr] = useState(false);
      useEffect(() => {
        let alive = true; setErr(false);
        if (!key) { setUrl(''); return; }
        resolveAvatar(key).then((u) => { if (alive) setUrl(u); });
        return () => { alive = false; };
      }, [key]);
      return html`<div class=${cls} style=${bg ? { background: bg } : undefined}>
        ${url && !err
          ? html`<img class="av-img" src=${url} alt="" loading="lazy" onError=${() => setErr(true)} />`
          : noteFor(fb)}
      </div>`;
    }

    /* ---------------------------- Search row ------------------------------ */
    function SearchRow({ song, t, pos, onAdd }) {
      const singer = song[2];
      const name = stripYtb(song[1]);
      const ytb = isYtb(song[1]);
      let btn;
      if (pos === 0) {
        btn = html`<div class="add-btn playing-now"><div class="eq" style=${{ height: '13px' }}><i></i><i></i><i></i><i></i></div></div>`;
      } else if (pos > 0) {
        btn = html`<div class="add-btn queued"><span class="pos-badge"><span>${pos}</span></span> ${t('queued')}</div>`;
      } else {
        btn = html`<button class="add-btn" onClick=${() => onAdd(song)}><span>＋</span><span>${t('add')}</span></button>`;
      }
      return html`<div class="row">
        <${Avatar} cls="thumb" singer=${singer} seed=${singer || name} bg=${gradientFor(singer || name)} />
        <div class="meta">
          <div class="name"><${Marquee} text=${name} />${ytb ? html`<span class="yt-tag">▶ YT</span>` : null}</div>
          <div class="singer">${singer || '—'}</div>
        </div>
        ${btn}
      </div>`;
    }

    /* ----------------------------- Browse view ---------------------------- */
    // Three ways to pick a song: by song, by singer (then their catalog), or
    // from YouTube-sourced songs (with an "add from YouTube" escape hatch).
    function BrowseView({ t, posMap, onAdd, openYt }) {
      const [mode, setMode] = useState('songs');           // songs | singers | ytb
      const [title, setTitle] = useState('');
      const [singer, setSinger] = useState('');
      const [acOpen, setAcOpen] = useState(false);
      const [singerQuery, setSingerQuery] = useState('');  // singers mode: list filter
      const [picked, setPicked] = useState(null);          // singers mode: chosen singer
      const [ytbText, setYtbText] = useState('');
      const [singers, setSingers] = useState([]);
      const [results, setResults] = useState([]);
      const [count, setCount] = useState(0);
      const [page, setPage] = useState(0);
      const [loading, setLoading] = useState(false);
      const [compact, setCompact] = useState(false);          // shrink the search bar on scroll
      const [singerLimit, setSingerLimit] = useState(SINGER_PAGE);
      const reqId = useRef(0);
      const sentinel = useRef(null);
      const scroller = useRef(null);

      useEffect(() => { api.singers().then(setSingers); }, []);

      // Collapse the search header once scrolled (window scroll on mobile,
      // inner .browse scroll on desktop). Hysteresis avoids flicker.
      useEffect(() => {
        const sc = scroller.current;
        const onScroll = () => {
          const y = Math.max(window.scrollY || 0, sc ? sc.scrollTop : 0);
          setCompact((prev) => (prev ? y > 14 : y > 46));
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        if (sc) sc.addEventListener('scroll', onScroll, { passive: true });
        return () => { window.removeEventListener('scroll', onScroll); if (sc) sc.removeEventListener('scroll', onScroll); };
      }, []);

      // Are we showing a song list (vs. the singer picker step)?
      const listing = mode === 'songs' || mode === 'ytb' || (mode === 'singers' && !!picked);
      const qp = useMemo(() => {
        if (mode === 'songs') return { keyword: title, singer, source: '' };
        if (mode === 'ytb') return { keyword: ytbText || '(YTB)', singer: '', source: 'ytb' };
        if (mode === 'singers' && picked) return { keyword: '', singer: picked, source: '' };
        return null;
      }, [mode, title, singer, ytbText, picked]);
      const qpKey = qp ? JSON.stringify(qp) : '';

      const fetchPage = useCallback(async (p, append) => {
        if (!qp) return;
        const id = ++reqId.current; setLoading(true);
        try {
          const [c, rows] = await api.op({ op: 'query', keyword: qp.keyword, singer: qp.singer, page: p, source: qp.source });
          if (id !== reqId.current) return;
          setCount(c || 0); setPage(p);
          setResults((prev) => (append ? [...prev, ...rows] : rows));
        } catch {} finally { if (id === reqId.current) setLoading(false); }
      }, [qpKey]);

      useEffect(() => {
        if (!listing) { reqId.current++; setResults([]); setCount(0); setLoading(false); return; }
        const hdl = setTimeout(() => { if (scroller.current) scroller.current.scrollTop = 0; fetchPage(0, false); }, 360);
        return () => clearTimeout(hdl);
      }, [qpKey, listing, fetchPage]);

      useEffect(() => {
        const el = sentinel.current; if (!el || !listing) return;
        const totalPages = Math.max(1, Math.ceil(count / 10));
        const io = new IntersectionObserver((es) => {
          if (es[0].isIntersecting && !loading && page + 1 < totalPages) fetchPage(page + 1, true);
        }, { rootMargin: '300px' });
        io.observe(el); return () => io.disconnect();
      }, [loading, page, count, listing, fetchPage]);

      const acMatches = useMemo(() => {
        const v = singer.trim().toUpperCase();
        return (v ? singers.filter((s) => s.toUpperCase().includes(v)) : singers).slice(0, 40);
      }, [singer, singers]);

      // Full filtered singer set; the grid renders a growing slice (infinite scroll).
      const singerFiltered = useMemo(() => {
        if (mode !== 'singers' || picked) return [];
        const v = singerQuery.trim().toUpperCase();
        return v ? singers.filter((s) => s.toUpperCase().includes(v)) : singers;
      }, [mode, picked, singerQuery, singers]);
      const singerMatches = useMemo(() => singerFiltered.slice(0, singerLimit), [singerFiltered, singerLimit]);

      // reset the visible count when the picker view / filter changes
      useEffect(() => { setSingerLimit(SINGER_PAGE); }, [mode, picked, singerQuery]);

      // grow the singer grid as the bottom sentinel scrolls into view
      useEffect(() => {
        const el = sentinel.current;
        if (!el || mode !== 'singers' || picked) return;
        const io = new IntersectionObserver((es) => {
          if (es[0].isIntersecting) setSingerLimit((n) => (n < singerFiltered.length ? n + SINGER_PAGE : n));
        }, { rootMargin: '400px' });
        io.observe(el);
        return () => io.disconnect();
      }, [mode, picked, singerFiltered.length]);

      const modes = [
        { id: 'songs', icon: '🎵', label: t('mode_songs') },
        { id: 'singers', icon: '🎤', label: t('mode_singers') },
        { id: 'ytb', icon: '▶', label: t('mode_ytb') },
      ];

      // Pasting a YouTube link into a search box jumps straight to the add-from-YT
      // review step instead of running a (futile) library search for the URL.
      const onSearchInput = (val, setField) => {
        const yt = matchYoutubeUrl(val);
        if (yt) { setField(''); openYt(yt); } else setField(val);
      };

      const resultsCard = html`
        ${results.length > 0 ? html`<div class="card">
          ${results.map((s, i) => html`<${SearchRow} key=${s[0] + '-' + i} song=${s} t=${t} onAdd=${onAdd} pos=${posMap.has(s[0]) ? posMap.get(s[0]) : -1} />`)}
        </div>` : null}
        ${loading ? html`<div class="loader"><div class="spinner"></div></div>` : null}`;

      return html`<div class="browse" ref=${scroller}>
        <div class=${'search-head' + (compact ? ' compact' : '')}>
          <div class="seg">
            ${modes.map((m) => html`<button key=${m.id} class=${mode === m.id ? 'active' : ''} onClick=${() => setMode(m.id)}>
              <span class="si">${m.icon}</span><span class="sl">${m.label}</span></button>`)}
          </div>

          ${mode === 'songs' ? html`
            <div class="search-fields">
              <div class="field">
                <span class="fi">🔎</span>
                <input value=${title} placeholder=${t('title')} autoComplete="off" onInput=${(e) => onSearchInput(e.target.value, setTitle)} />
                ${title ? html`<button class="clear-x" onClick=${() => setTitle('')}>✕</button>` : null}
              </div>
              <div class="field">
                <span class="fi">🎤</span>
                <input value=${singer} placeholder=${t('singer')} autoComplete="off"
                  onInput=${(e) => { setSinger(e.target.value); setAcOpen(true); }}
                  onFocus=${() => setAcOpen(true)} onBlur=${() => setTimeout(() => setAcOpen(false), 150)} />
                ${singer ? html`<button class="clear-x" onClick=${() => setSinger('')}>✕</button>` : null}
                ${acOpen && acMatches.length > 0 ? html`<div class="ac-list">
                  ${acMatches.map((s) => html`<div key=${s} class="ac-item" onMouseDown=${() => { setSinger(s); setAcOpen(false); }}><span class="fi">🎤</span>${s}</div>`)}
                </div>` : null}
              </div>
            </div>
            ${(title || singer) ? html`<div class="toolbar"><button class="chip" onClick=${() => { setTitle(''); setSinger(''); }}>↺ ${t('reset')}</button></div>` : null}
          ` : null}

          ${mode === 'singers' && !picked ? html`
            <div class="field">
              <span class="fi">🎤</span>
              <input value=${singerQuery} placeholder=${t('singer_search_ph')} autoComplete="off" onInput=${(e) => setSingerQuery(e.target.value)} />
              ${singerQuery ? html`<button class="clear-x" onClick=${() => setSingerQuery('')}>✕</button>` : null}
            </div>` : null}

          ${mode === 'singers' && picked ? html`
            <div class="crumb">
              <button class="back-chip" onClick=${() => setPicked(null)}>‹ ${t('back')}</button>
              <div class="crumb-name">🎤 ${picked}</div>
            </div>` : null}

          ${mode === 'ytb' ? html`
            <div class="field">
              <span class="fi">🔎</span>
              <input value=${ytbText} placeholder=${t('ytb_search_ph')} autoComplete="off" onInput=${(e) => onSearchInput(e.target.value, setYtbText)} />
              ${ytbText ? html`<button class="clear-x" onClick=${() => setYtbText('')}>✕</button>` : null}
            </div>
            <div style=${{ marginTop: '12px' }}>
              <button class="cta" onClick=${() => openYt()}><span class="yi">▶</span> ${t('add_from_yt')}</button>
            </div>` : null}
        </div>

        ${listing ? html`
          <div class="section-title">
            ${mode === 'ytb' ? html`<span>▶</span><span>${t('mode_ytb')}</span>`
              : mode === 'singers' ? html`<span>🎵</span><span>${t('songs_by')}</span>`
              : (!title && !singer) ? html`<span>🔥</span><span>${t('trending')}</span>`
              : html`<span>🎵</span><span>${t('results')}</span>`}
            ${count > 0 ? html`<span style=${{ color: 'var(--accent)' }}>· ${count}</span>` : null}
          </div>
          ${resultsCard}
          ${!loading && results.length === 0 ? (mode === 'ytb'
            ? html`<div class="empty"><div class="em-ic">📺</div><div class="em-t">${t('ytb_empty_t')}</div><div class="em-s">${t('ytb_empty_sub')}</div></div>`
            : html`<div class="empty"><div class="em-ic">🔍</div><div class="em-t">${t('no_results')}</div><div class="em-s">${t('no_results_sub')}</div></div>`) : null}
          ${!loading && results.length > 0 && page + 1 >= Math.max(1, Math.ceil(count / 10))
            ? html`<div class="list-end">${t('list_end')}</div>` : null}
        ` : html`
          <div class="section-title"><span>🎤</span><span>${t('pick_singer')}</span>
            ${singerFiltered.length > 0 ? html`<span style=${{ color: 'var(--accent)' }}>· ${singerFiltered.length}</span>` : null}
          </div>
          ${singerMatches.length > 0 ? html`<div class="singer-grid">
            ${singerMatches.map((s) => html`<div class="singer-card" key=${s} onClick=${() => { setPicked(s); window.scrollTo({ top: 0 }); if (scroller.current) scroller.current.scrollTop = 0; }}>
              <${Avatar} cls="sg-avatar" singer=${s} seed=${s} bg=${gradientFor(s)} />
              <div class="sg-name">${s}</div>
            </div>`)}
          </div>` : html`<div class="empty"><div class="em-ic">🔍</div><div class="em-t">${t('singers_none')}</div><div class="em-s">${t('singers_none_sub')}</div></div>`}
          ${singerMatches.length > 0 && singerMatches.length >= singerFiltered.length ? html`<div class="list-end">${t('list_end')}</div>` : null}
        `}

        <div ref=${sentinel} style=${{ height: '1px' }}></div>
      </div>`;
    }

    /* ------------------------------- Stage -------------------------------- */
    // Now-playing + controls + up-next. Shared by the mobile sheet and desktop panel.
    function Stage({ t, queue, vocalOn, onToggleVocal, onReplay, onSkip, onTop, onRemove }) {
      const playing = queue[0];
      const upNext = queue.slice(1);
      const upRef = useRef(null);
      const contentRef = useRef(null);
      const endRef = useRef(null);

      // Rubber-band overscroll: pull up past the bottom of the queue to reveal the
      // "end of list" message as overflow content, then it springs back on release.
      useEffect(() => {
        const sc = upRef.current, content = contentRef.current;
        if (!sc || !content) return;
        let startY = 0, pulling = false;
        // Always animate the content back to rest. Called on touchend/cancel and
        // whenever we stop pulling, so the reveal can never get stuck open.
        const TRANS = 'transform 0.42s cubic-bezier(0.22,1,0.3,1)';
        const springBack = () => {
          pulling = false;
          sc.classList.remove('overscrolling');          // restore the scroll indicator
          if (!content.style.transform) return;          // not revealing
          const endEl = endRef.current;
          content.style.transition = TRANS;
          if (endEl) endEl.style.transition = TRANS;
          void content.offsetHeight;                     // flush: commit current transforms WITH the transition,
          content.style.transform = '';                  // so changing them now actually animates (Safari coalesces otherwise)
          if (endEl) endEl.style.transform = '';         // back to hidden (CSS translateY(52px))
        };
        const start = (e) => { if (e.touches.length === 1) { startY = e.touches[0].clientY; pulling = false; } };
        const move = (e) => {
          if (e.touches.length !== 1) return;
          const endEl = endRef.current;
          if (!endEl) { if (pulling) springBack(); return; }   // empty queue, nothing to reveal
          const dy = e.touches[0].clientY - startY;            // < 0 when pulling up
          const atBottom = sc.scrollHeight - sc.scrollTop - sc.clientHeight < 2;
          if (atBottom && dy < 0) {
            // Only claim a *deliberate* pull (cancelable). During a fast fling the
            // move is non-cancelable while native momentum settles — leave it to
            // native (bounce is disabled, so it just clamps) so nothing sticks.
            if (!e.cancelable) { if (pulling) springBack(); return; }
            if (!pulling) { pulling = true; content.style.transition = 'none'; endEl.style.transition = 'none'; sc.classList.add('overscrolling'); }
            e.preventDefault();
            const pull = Math.min(-dy * 0.5, 52);              // damped, capped to the message height
            content.style.transform = `translateY(${-pull}px)`;
            endEl.style.transform = `translateY(${52 - pull}px)`;
          } else if (pulling) {
            springBack();
          }
        };
        const end = () => { springBack(); };                   // safety net: always release the pull
        // if a native scroll ever happens with a stray transform left, clear it
        const onScroll = () => { if (!pulling && content.style.transform) springBack(); };
        sc.addEventListener('touchstart', start, { passive: true });
        sc.addEventListener('touchmove', move, { passive: false });
        sc.addEventListener('touchend', end);
        sc.addEventListener('touchcancel', end);
        sc.addEventListener('scroll', onScroll, { passive: true });
        return () => {
          sc.removeEventListener('touchstart', start);
          sc.removeEventListener('touchmove', move);
          sc.removeEventListener('touchend', end);
          sc.removeEventListener('touchcancel', end);
          sc.removeEventListener('scroll', onScroll);
        };
      }, []);

      return html`<div class="stage">
        ${playing ? html`
          <div class="np" style=${{ background: gradientFor(playing[1]) }}>
            <div class="np-tag"><div class="eq"><i></i><i></i><i></i><i></i></div> ${t('now_playing')}</div>
            <div class="np-row">
              <${Avatar} cls="np-art" singer=${playing[2]} seed=${playing[1]} />
              <div><div class="np-name">${stripYtb(playing[1])}${isYtb(playing[1]) ? html`<span class="yt-tag">▶ YT</span>` : null}</div><div class="np-singer">${playing[2] || '—'}</div></div>
            </div>
          </div>`
        : html`<div class="np" style=${{ background: 'linear-gradient(135deg,#4b5563,#374151)' }}>
            <div class="np-tag">🎤 ${t('now_playing')}</div>
            <div class="np-row"><div class="np-art">🎙️</div>
              <div><div class="np-name">${t('tap_to_start')}</div><div class="np-singer">${t('tap_to_start_sub')}</div></div></div>
          </div>`}

        <div class="controls">
          <button class=${'ctl ' + (vocalOn === false ? 'on' : '')} onClick=${onToggleVocal}>
            <span class="ci">🎙️</span><span class="cl">${vocalOn === false ? t('accomp') : t('vocal')}</span>
          </button>
          <button class="ctl" onClick=${onReplay} disabled=${!playing}><span class="ci">↻</span><span class="cl">${t('replay')}</span></button>
          <button class="ctl warn" onClick=${onSkip} disabled=${!playing}><span class="ci">⏭</span><span class="cl">${t('skip')}</span></button>
        </div>

        <div class="section-title" style=${{ marginTop: '20px' }}>
          <span>📋</span><span>${t('up_next')}</span>
          ${upNext.length > 0 ? html`<span style=${{ color: 'var(--accent)' }}>· ${upNext.length} ${t('songs')}</span>` : null}
        </div>
        <div class="upnext-zone">
          <div class="upnext" ref=${upRef}>
            <div class="upnext-content" ref=${contentRef}>
              ${upNext.length > 0 ? html`
                ${upNext.map((s, i) => html`
                  <div class="q-row" key=${s[0]}>
                    <div class="q-pos">${i + 1}</div>
                    <div class="meta"><div class="name"><${Marquee} text=${stripYtb(s[1])} />${isYtb(s[1]) ? html`<span class="yt-tag">▶ YT</span>` : null}</div><div class="singer">${s[2] || '—'}</div></div>
                    <div class="q-actions">
                      ${i > 0 ? html`<button class="q-btn" onClick=${() => onTop(s[0])}><span>⤒</span><span class="ql">${t('play_next')}</span></button>` : null}
                      <button class="q-btn danger" onClick=${() => onRemove(s[0])}><span>✕</span><span class="ql">${t('remove')}</span></button>
                    </div>
                  </div>`)}
              `
              : html`<div class="empty"><div class="em-ic">🎵</div><div class="em-t">${t('empty_queue')}</div><div class="em-s">${t('empty_queue_sub')}</div></div>`}
            </div>
          </div>
          ${upNext.length > 0 ? html`<div class="upnext-end" ref=${endRef}>${t('list_end')}</div>` : null}
        </div>
      </div>`;
    }

    /* ----------------------------- Mini player ---------------------------- */
    function MiniPlayer({ t, queue, bump, minimizing, onOpen }) {
      const playing = queue[0];
      const next = queue[1];
      const inLine = Math.max(0, queue.length - 1);
      const miniRef = useRef(null);
      const onOpenRef = useRef(onOpen);
      onOpenRef.current = onOpen;

      // Swipe up on the pill to pull the full player open (as well as tapping).
      useEffect(() => {
        const el = miniRef.current; if (!el) return;
        let startY = 0, startX = 0, fire = false;
        const start = (e) => { startY = e.touches[0].clientY; startX = e.touches[0].clientX; fire = false; el.style.transition = 'none'; };
        const move = (e) => {
          const dy = e.touches[0].clientY - startY;
          const dx = Math.abs(e.touches[0].clientX - startX);
          if (dy < 0 && -dy > dx) {                 // mostly-vertical upward drag
            if (e.cancelable) e.preventDefault();
            const lift = Math.min(-dy, 64);
            el.style.transform = `translateY(${-lift}px)`;
            el.style.opacity = String(Math.max(0.5, 1 - lift / 140));
            if (-dy > 36) fire = true;
          }
        };
        const end = () => {
          el.style.transition = ''; el.style.transform = ''; el.style.opacity = '';
          if (fire) onOpenRef.current();
          fire = false;
        };
        el.addEventListener('touchstart', start, { passive: true });
        el.addEventListener('touchmove', move, { passive: false });
        el.addEventListener('touchend', end);
        el.addEventListener('touchcancel', end);
        return () => {
          el.removeEventListener('touchstart', start);
          el.removeEventListener('touchmove', move);
          el.removeEventListener('touchend', end);
          el.removeEventListener('touchcancel', end);
        };
      }, []);

      return html`<div class="mini-dock">
        <div class=${'mini' + (bump ? ' bump' : '') + (minimizing ? ' minimizing' : '')} ref=${miniRef} onClick=${onOpen}>
          ${playing ? html`
            <${Avatar} cls="m-art" singer=${playing[2]} seed=${playing[1]} bg=${gradientFor(playing[1])} />
            <div class="m-meta">
              <div class="m-label"><div class="eq" style=${{ height: '11px' }}><i></i><i></i><i></i><i></i></div> ${t('now_playing')}</div>
              <div class="m-name"><${Marquee} text=${stripYtb(playing[1])} /></div>
              ${next ? html`<div class="m-next">${t('next_short')}: ${stripYtb(next[1])}</div>` : null}
            </div>`
          : html`
            <div class="m-art" style=${{ background: 'linear-gradient(135deg,#4b5563,#374151)' }}>🎙️</div>
            <div class="m-meta"><div class="m-name">${t('mini_idle')}</div><div class="m-next">${t('mini_idle_sub')}</div></div>`}
          <div class=${'m-count' + (inLine ? '' : ' empty')}>
            <span>📋</span><span class=${'cc-num' + (bump ? ' bump' : '')}>${inLine}</span>
          </div>
        </div>
      </div>`;
    }

    /* --------------------------- Player sheet ----------------------------- */
    // Bottom sheet (mobile) with swipe-down-to-dismiss. The sheet follows the
    // finger and closes past a threshold; otherwise it snaps back.
    function PlayerSheet({ open, onClose, children }) {
      const sheetRef = useRef(null);
      const scrimRef = useRef(null);
      const onCloseRef = useRef(onClose);
      onCloseRef.current = onClose;

      // Slide the sheet out, then close — used by tap (scrim/handle) so the
      // panel always animates down, matching the swipe-to-dismiss gesture.
      const animateClose = useCallback(() => {
        const sheet = sheetRef.current;
        if (sheet) { sheet.classList.remove('dragging', 'will-close'); sheet.style.transform = 'translateY(100%)'; }
        if (scrimRef.current) scrimRef.current.style.opacity = '0';
        setTimeout(() => onCloseRef.current(), 280);
      }, []);

      useEffect(() => {
        const sheet = sheetRef.current; if (!sheet) return;
        let startY = 0, dy = 0, dragging = false, allow = false;
        // a downward drag dismisses, unless it starts inside the up-next list
        // while that list is scrolled down (then it should scroll normally).
        const scrollerAtTop = (target) => {
          let el = target;
          while (el && el !== sheet) {
            if (el.classList && el.classList.contains('upnext')) return el.scrollTop <= 0;
            el = el.parentNode;
          }
          return true;
        };
        const start = (e) => {
          if (e.touches.length !== 1) { allow = false; return; }
          startY = e.touches[0].clientY; dy = 0; dragging = false;
          allow = scrollerAtTop(e.target);
        };
        const move = (e) => {
          if (!allow || e.touches.length !== 1) return;
          dy = e.touches[0].clientY - startY;
          if (dy <= 0) { if (dragging) { sheet.style.transform = ''; dragging = false; } return; }
          if (!dragging && !e.cancelable) return;   // browser already scrolling; don't hijack
          dragging = true;
          if (e.cancelable) e.preventDefault();     // non-passive listener; skip if already scrolling
          sheet.classList.add('dragging');
          sheet.classList.toggle('will-close', dy > Math.min(150, sheet.offsetHeight * 0.28));
          sheet.style.transform = `translateY(${dy}px)`;
          if (scrimRef.current) scrimRef.current.style.opacity = String(Math.max(0, 1 - dy / 420));
        };
        const end = () => {
          if (!dragging) return;
          dragging = false;
          sheet.classList.remove('dragging');          // restore the transition
          sheet.classList.remove('will-close');
          const threshold = Math.min(150, sheet.offsetHeight * 0.28);
          if (dy > threshold) {
            // far enough: slide the rest of the way out, then close
            sheet.style.transform = 'translateY(100%)';
            if (scrimRef.current) scrimRef.current.style.opacity = '0';
            setTimeout(() => onCloseRef.current(), 280);
          } else {
            // not far enough: snap back into place
            sheet.style.transform = '';
            if (scrimRef.current) scrimRef.current.style.opacity = '';
          }
          dy = 0;
        };
        sheet.addEventListener('touchstart', start, { passive: true });
        sheet.addEventListener('touchmove', move, { passive: false });
        sheet.addEventListener('touchend', end);
        sheet.addEventListener('touchcancel', end);
        return () => {
          sheet.removeEventListener('touchstart', start);
          sheet.removeEventListener('touchmove', move);
          sheet.removeEventListener('touchend', end);
          sheet.removeEventListener('touchcancel', end);
        };
      }, []);

      // clear any leftover drag transform / scrim fade when (re)opening, and
      // lock background scrolling while the sheet is up (document scrolls on mobile).
      useEffect(() => {
        if (open) {
          if (sheetRef.current) sheetRef.current.style.transform = '';
          if (scrimRef.current) scrimRef.current.style.opacity = '';
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
        return () => { document.body.style.overflow = ''; };
      }, [open]);

      return html`<div class=${'sheet-wrap' + (open ? ' open' : '')}>
        <div class="sheet-scrim" ref=${scrimRef} onClick=${animateClose}></div>
        <div class="sheet" ref=${sheetRef}>
          <div class="grab-zone" onClick=${animateClose}>
            <div class="grabber"></div>
          </div>
          ${open ? children : null}
        </div>
      </div>`;
    }

    /* -------------------------------- App --------------------------------- */
    /* --------------------------- Add from YouTube -------------------------- */
    // Native replacement for the legacy /yt iframe: paste a link → review the
    // auto-filled title / singer / lyrics source → submit, then watch the live
    // processing queue (which polls itself instead of needing a manual refresh).
    function YtAddView({ t, onToast, initialUrl }) {
      const [tab, setTab] = useState('add');           // add | queue
      const [url, setUrl] = useState(initialUrl || '');
      const [fetching, setFetching] = useState(false);
      const [info, setInfo] = useState(null);          // video_info from /yt_link
      const [title, setTitle] = useState('');
      const [singer, setSinger] = useState('');
      const [caps, setCaps] = useState('');
      const [err, setErr] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [singers, setSingers] = useState([]);
      const [acOpen, setAcOpen] = useState(false);
      const [list, setList] = useState([]);
      const [confirmDbl, setConfirmDbl] = useState(false);   // "double-check" gate
      const valsRef = useRef({ title: '', singer: '' });     // live field values for swipe base
      valsRef.current = { title, singer };
      const titleAreaRef = useRef(null);                     // multiline song-title box
      const freezeTitleRef = useRef(false);                  // pause auto-grow during a pan-select
      const autosizeTitle = useCallback(() => {
        const el = titleAreaRef.current; if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 220) + 'px';
      }, []);

      useEffect(() => { api.singers().then(setSingers); }, []);
      // grow the title box to fit its content — but never mid-pan, or the chips below
      // would shift under the finger and throw off the selection
      useEffect(() => { if (!freezeTitleRef.current) autosizeTitle(); }, [title, info, autosizeTitle]);

      // Poll the processing queue while the modal is open — quicker while work is
      // in flight, slower when idle. (The legacy page only refreshed on a tap.)
      const loadList = useCallback(async () => {
        try { const r = await fetch('/yt_list'); const d = await r.json(); setList(Array.isArray(d) ? d : []); } catch {}
      }, []);
      const active = useMemo(() => list.filter((x) => x[2] <= 1000 && x[2] !== -1).length, [list]);
      useEffect(() => {
        loadList();
        const id = setInterval(loadList, (active > 0 || tab === 'queue') ? 2500 : 6000);
        return () => clearInterval(id);
      }, [loadList, tab, active]);

      const fetchInfo = useCallback(async (explicit) => {
        const link = (explicit != null ? explicit : url).trim();
        if (!link || fetching) return;
        setFetching(true); setErr('');
        try {
          const r = await fetch('/yt_link', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: link }) });
          const data = await r.json();
          // backend returns a plain string when the video is too long, null on a bad link
          if (typeof data === 'string') setErr(t('duration_disallowed'));
          else if (!data || typeof data !== 'object' || !data.title) setErr(t('yt_err_link'));
          else if (data.duration > 600) setErr(t('duration_disallowed'));
          else { setInfo(data); setTitle(data.title || ''); setSinger(data.singer || ''); setCaps(''); }
        } catch { setErr(t('yt_err_link')); }
        setFetching(false);
      }, [url, fetching, t]);

      // If opened with a link pasted from the search box, fetch it immediately and
      // skip straight to the review step.
      useEffect(() => { if (initialUrl) fetchInfo(initialUrl); /* eslint-disable-next-line */ }, []);

      const resetForm = useCallback(() => { setInfo(null); setUrl(''); setTitle(''); setSinger(''); setCaps(''); setErr(''); }, []);

      const doSubmit = useCallback(async () => {
        if (submitting) return;
        setConfirmDbl(false); setSubmitting(true); setErr('');
        try {
          const payload = { url: url.trim(), title: title.trim(), singer: singer.trim() };
          if (caps) payload.caps = caps;
          await fetch('/add_yt_source', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          onToast(t('yt_added'), 'good', '▶');
          resetForm(); setTab('queue'); loadList();
        } catch { setErr(t('yt_err_submit')); }
        setSubmitting(false);
      }, [title, singer, url, caps, submitting, onToast, t, resetForm, loadList]);

      // The server matches lyrics off the exact song name + singer, so if the user
      // submits the auto-parsed values untouched, ask them to double-check first.
      const untouched = info && title.trim() === (info.title || '').trim() && singer.trim() === (info.singer || '').trim();
      const onSubmitClick = useCallback(() => {
        if (!title.trim()) { setErr(t('yt_err_title')); return; }
        if (untouched) { setConfirmDbl(true); return; }
        doSubmit();
      }, [title, untouched, doSubmit, t]);

      // Append a token, inserting a space only between ASCII words (English stays
      // spaced, CJK stays tight).
      const smartAppend = (v, tok) => {
        const sp = v && /[A-Za-z0-9]$/.test(v) && /^[A-Za-z0-9]/.test(tok) ? ' ' : '';
        return v + sp + tok;
      };

      // Tap a chip to add its token; or press and drag across chips to add a whole
      // range at once — iOS-Photos pan-to-select. Selection spans every chip between
      // the anchor (where the drag started) and the chip under the finger, *in index
      // order* — so panning past skipped chips fills them in, and panning back drops
      // them again. The field is rebuilt from its pre-drag value each move, so it is
      // fully revertible until the finger lifts.
      const startChipSwipe = (key) => (e) => {
        if (e.button != null && e.button > 0) return;
        const touch = e.pointerType === 'touch' || e.pointerType === 'pen';
        const setter = key === 'singer' ? setSinger : setTitle;
        const sug = (info && info.suggestions) || [];
        const base = valsRef.current[key] || '';               // field value before this stroke
        const startChip = e.currentTarget;
        const rowEl = startChip.closest('.yt-chips');
        const anchor = +startChip.dataset.index;
        const sx = e.clientX, sy = e.clientY;
        let mode = 'idle', cur = anchor, blockTouch = null;

        const apply = (current) => {
          cur = current;
          const step = current >= anchor ? 1 : -1;
          let v = base;
          for (let i = anchor; ; i += step) { v = smartAppend(v, sug[i]); if (i === current) break; }
          setter(v);
          const lo = Math.min(anchor, current), hi = Math.max(anchor, current);
          if (rowEl) rowEl.querySelectorAll('.yt-chip').forEach((c) => {
            const idx = +c.dataset.index; c.classList.toggle('picked', idx >= lo && idx <= hi);
          });
        };
        const chipIndexAt = (x, y) => {
          const el = document.elementFromPoint(x, y);
          const chip = el && el.closest ? el.closest('.yt-chip') : null;
          if (!chip || (rowEl && chip.closest('.yt-chips') !== rowEl)) return null;
          return +chip.dataset.index;
        };
        const onMove = (ev) => {
          if (mode === 'idle') {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (Math.hypot(dx, dy) < (touch ? 12 : 8)) return;        // wait for a clear intent
            // On touch, only begin selecting on a *horizontal* swipe; a vertical drag
            // is meant to scroll the list, so bail and let the browser scroll it.
            if (touch && Math.abs(dx) <= Math.abs(dy) * 1.2) { mode = 'scroll'; cleanup(); return; }
            mode = 'paint';
            if (key === 'title') freezeTitleRef.current = true;        // pin title height — no chip jitter
            if (touch) {
              // guard preventDefault: once the browser is scrolling, touchmove is
              // non-cancelable and trying to cancel it logs an [Intervention] warning
              blockTouch = (tm) => { if (tm.cancelable) tm.preventDefault(); };
              document.addEventListener('touchmove', blockTouch, { passive: false });
            }
            apply(anchor);
          }
          if (ev.cancelable) ev.preventDefault();
          const idx = chipIndexAt(ev.clientX, ev.clientY);
          if (idx != null && idx !== cur) apply(idx);
        };
        const onUp = () => {
          if (mode === 'idle') setter(smartAppend(base, sug[anchor]));   // plain tap = one token
          cleanup();
        };
        function cleanup() {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          document.removeEventListener('pointercancel', onUp);
          if (blockTouch) { document.removeEventListener('touchmove', blockTouch); blockTouch = null; }
          if (key === 'title') { freezeTitleRef.current = false; requestAnimationFrame(autosizeTitle); }
          if (rowEl) setTimeout(() => rowEl.querySelectorAll('.yt-chip.picked').forEach((c) => c.classList.remove('picked')), 280);
        }
        document.addEventListener('pointermove', onMove, { passive: false });
        document.addEventListener('pointerup', onUp);
        document.addEventListener('pointercancel', onUp);
      };

      const sugChips = (key) => (info && info.suggestions && info.suggestions.length) ? html`
        <div class="yt-chips">
          <span class="qf-label">${t('yt_quickfill')}</span>
          ${info.suggestions.map((s, i) => html`<button key=${i} class="yt-chip" data-index=${i} onPointerDown=${startChipSwipe(key)}>${s}</button>`)}
        </div>` : null;

      const acMatches = useMemo(() => {
        const v = singer.trim().toUpperCase();
        return (v ? singers.filter((s) => s.toUpperCase().includes(v)) : singers).slice(0, 30);
      }, [singer, singers]);

      const fmtDur = (s) => { s = s | 0; return ((s / 60) | 0) + ':' + String(s % 60).padStart(2, '0'); };
      const hasCaps = info && info.captions && (((info.captions.original || []).length) || ((info.captions.generated || []).length));

      const tabs = [
        { id: 'add', icon: '＋', label: t('yt_add_tab') },
        { id: 'queue', icon: '☰', label: t('yt_queue_tab'), badge: active },
      ];

      return html`<div class="yt-flow">
        <div class="yt-tabs">
          <div class="seg">
            ${tabs.map((tb) => html`<button key=${tb.id} class=${tab === tb.id ? 'active' : ''} onClick=${() => setTab(tb.id)}>
              <span class="si">${tb.icon}</span><span class="sl">${tb.label}</span>
              ${tb.badge ? html`<span class="tab-badge">${tb.badge}</span>` : null}</button>`)}
          </div>
        </div>

        <div class="yt-body">
          ${tab === 'add' ? (fetching && !info ? html`
            <div class="yt-loading"><div class="spinner"></div><div>${t('yt_fetching')}</div></div>
          ` : !info ? html`
            <div class="yt-form">
              <div class="field">
                <span class="fi">🔗</span>
                <input value=${url} placeholder=${t('yt_link_ph')} autoComplete="off" inputMode="url"
                  onInput=${(e) => setUrl(e.target.value)} onKeyDown=${(e) => { if (e.key === 'Enter') fetchInfo(); }} />
                ${url ? html`<button class="clear-x" onClick=${() => setUrl('')}>✕</button>` : null}
              </div>
              <button class="cta" disabled=${fetching || !url.trim()} onClick=${() => fetchInfo()}>
                ${fetching ? html`<span class="btn-spin"></span>` : html`<span class="yi">▶</span>`} ${t('yt_fetch')}
              </button>
              ${err ? html`<div class="yt-err">${err}</div>` : null}
              <div class="yt-help">${t('yt_link_help')}</div>
            </div>
          ` : html`
            <div class="yt-form">
              <div class="yt-thumb">
                ${info.thumbnail ? html`<img src=${info.thumbnail} alt="" />` : null}
                <button class="yt-change" onClick=${resetForm}>↺ ${t('yt_change')}</button>
                ${info.duration ? html`<span class="yt-dur">${fmtDur(info.duration)}</span>` : null}
              </div>

              <div class="yt-field-wrap">
                <div class="yt-label">🎵 ${t('yt_song_name')}</div>
                <div class="field ta-field">
                  <span class="fi">🎵</span>
                  <textarea ref=${titleAreaRef} class="yt-ta" rows="1" value=${title} placeholder=${t('yt_song_name')}
                    autoComplete="off" spellCheck="false" onInput=${(e) => setTitle(e.target.value)}></textarea>
                  ${title ? html`<button class="clear-x" onClick=${() => setTitle('')}>✕</button>` : null}
                </div>
                ${sugChips('title')}
              </div>

              <div class="yt-field-wrap">
                <div class="yt-label">🎤 ${t('yt_singer')}</div>
                <div class="field">
                  <span class="fi">🎤</span>
                  <input value=${singer} placeholder=${t('yt_singer')} autoComplete="off"
                    onInput=${(e) => { setSinger(e.target.value); setAcOpen(true); }}
                    onFocus=${() => setAcOpen(true)} onBlur=${() => setTimeout(() => setAcOpen(false), 150)} />
                  ${singer ? html`<button class="clear-x" onClick=${() => setSinger('')}>✕</button>` : null}
                  ${acOpen && acMatches.length > 0 ? html`<div class="ac-list">
                    ${acMatches.map((s) => html`<div key=${s} class="ac-item" onMouseDown=${() => { setSinger(s); setAcOpen(false); }}><span class="fi">🎤</span>${s}</div>`)}
                  </div>` : null}
                </div>
                ${sugChips('singer')}
              </div>

              ${hasCaps ? html`
                <div class="yt-field-wrap">
                  <div class="yt-label">💬 ${t('yt_caption')}</div>
                  <select class="yt-select" value=${caps} onChange=${(e) => setCaps(e.target.value)}>
                    <option value="">${t('yt_cap_none')}</option>
                    ${(info.captions.original || []).map((c, i) => html`<option key=${'o' + i} value=${c[1]}>${t('yt_cap_orig')} · ${c[0]}</option>`)}
                    ${(info.captions.generated || []).map((c, i) => html`<option key=${'g' + i} value=${c[1]}>${t('yt_cap_auto')} · ${c[0]}</option>`)}
                  </select>
                </div>` : null}

              ${err ? html`<div class="yt-err">${err}</div>` : null}
              <div class="yt-actions">
                <button class="yt-reset" onClick=${resetForm}>${t('yt_reset')}</button>
                <button class="yt-submit" disabled=${submitting || !title.trim()} onClick=${onSubmitClick}>
                  ${submitting ? html`<span class="btn-spin"></span>` : html`<span>▶</span>`} ${t('yt_submit')}
                </button>
              </div>
            </div>
          `) : html`
            ${list.length === 0 ? html`
              <div class="empty"><div class="em-ic">📺</div><div class="em-t">${t('yt_queue_empty_t')}</div><div class="em-s">${t('yt_queue_empty_sub')}</div></div>
            ` : html`<div class="yt-list">
              ${[...list].reverse().map((it, i) => {
                const st = it[2];
                const cls = st > 1000 ? 'done' : st === -1 ? 'err' : st === 0 ? 'pending' : 'proc';
                const label = st > 1000 ? t('yt_st_done') : st === -1 ? t('yt_st_err') : st === 0 ? t('yt_st_pending') : t('yt_st_proc');
                return html`<div class="yt-item" key=${i}>
                  <div class="yt-it-main">
                    <div class="yt-it-name">${it[0]}</div>
                    ${it[1] ? html`<div class="yt-it-sub">🎤 ${it[1]}</div>` : null}
                  </div>
                  <span class=${'yt-pill ' + cls}>${cls === 'proc' ? html`<span class="pdot"></span>` : null}${label}</span>
                </div>`;
              })}
            </div>`}
          `}
        </div>

        ${confirmDbl ? html`<div class="overlay" onClick=${() => setConfirmDbl(false)}>
          <div class="dialog" onClick=${(e) => e.stopPropagation()}>
            <div class="dg-ic">🔎</div><h3>${t('yt_dbl_t')}</h3><p>${t('yt_dbl_p')}</p>
            <div class="yt-dbl-preview">
              <div><span>🎵</span>${title}</div>
              <div><span>🎤</span>${singer || '—'}</div>
            </div>
            <div class="dg-actions">
              <button class="dg-cancel" onClick=${() => setConfirmDbl(false)}>${t('yt_dbl_edit')}</button>
              <button class="dg-ok" onClick=${doSubmit}>${t('yt_dbl_ok')}</button>
            </div>
          </div>
        </div>` : null}
      </div>`;
    }

    function App() {
      const { lang, t, changeLang } = useI18n();
      const queue = useQueue();
      const [toasts, setToasts] = useState([]);
      const [langOpen, setLangOpen] = useState(false);
      const [ytOpen, setYtOpen] = useState(false);
      const [ytUrl, setYtUrl] = useState('');            // prefill for the YT modal (paste-in-search shortcut)
      const [sheetOpen, setSheetOpen] = useState(false);
      const [confirm, setConfirm] = useState(null);
      const [vocalOn, setVocalOn] = useState(null);
      const [bump, setBump] = useState(false);
      const [minimizing, setMinimizing] = useState(false);
      const toastSeq = useRef(0);
      const prevLen = useRef(0);
      const prevSheet = useRef(false);

      // When the expanded sheet closes, play a "collapse into the pill" animation.
      useEffect(() => {
        if (prevSheet.current && !sheetOpen) {
          setMinimizing(true);
          const h = setTimeout(() => setMinimizing(false), 480);
          prevSheet.current = sheetOpen;
          return () => clearTimeout(h);
        }
        prevSheet.current = sheetOpen;
      }, [sheetOpen]);

      // id -> index in queue (0 = now playing). Drives position cues everywhere.
      const posMap = useMemo(() => { const m = new Map(); queue.forEach((s, i) => m.set(s[0], i)); return m; }, [queue]);

      // Pulse the queue badge whenever the line grows.
      useEffect(() => {
        if (queue.length > prevLen.current && prevLen.current !== 0) {
          setBump(true); const h = setTimeout(() => setBump(false), 520); prevLen.current = queue.length; return () => clearTimeout(h);
        }
        prevLen.current = queue.length;
      }, [queue.length]);

      const toast = useCallback((msg, kind = '', icon = '✓') => {
        const id = ++toastSeq.current;
        setToasts((p) => [...p, { id, msg, kind, icon }]);
        setTimeout(() => setToasts((p) => p.filter((x) => x.id !== id)), 2400);
      }, []);

      // open the YT add modal; with a url it jumps straight to the review step
      const openYt = useCallback((url) => { setYtUrl(typeof url === 'string' ? url : ''); setYtOpen(true); }, []);
      const closeYt = useCallback(() => { setYtOpen(false); setYtUrl(''); }, []);

      const add = useCallback(async (song) => {
        if (posMap.has(song[0])) return;
        // Optimistic position = current line length (slot it will fall into).
        const slot = Math.max(1, queue.length);
        await api.op({ op: 'add', song });
        if (queue.length === 0) toast(t('added_first'), 'good', '🎤');
        else toast(t('added_pos').replace('{n}', lang === 'en' ? ordinal(slot) : slot), 'good', '🎵');
      }, [posMap, queue.length, toast, t, lang]);

      const toggleVocal = useCallback(async () => { setVocalOn(await api.vocal()); }, []);
      const top = useCallback(async (id) => { await api.op({ op: 'top', id }); toast(t('moved_toast'), 'good', '⤒'); }, [toast, t]);
      const remove = useCallback(async (id) => { await api.op({ op: 'remove', id }); toast(t('removed_toast'), '', '🗑️'); }, [toast, t]);
      const replay = useCallback(async () => { await api.op({ op: 'replay' }); toast(t('replayed_toast'), 'good', '↻'); }, [toast, t]);
      const askSkip = useCallback(() => setConfirm({
        icon: '⏭', title: t('skip_confirm_t'), msg: t('skip_confirm_p'), danger: true, ok: t('confirm_skip'),
        onOk: async () => { setConfirm(null); await api.op({ op: 'skip' }); toast(t('skipped_toast'), 'warn', '⏭'); },
      }), [t, toast]);

      const stageProps = { t, queue, vocalOn, onToggleVocal: toggleVocal, onReplay: replay, onSkip: askSkip, onTop: top, onRemove: remove };

      return html`<div class="app">
        <header class="topbar">
          <div class="brand">
            <div class="logo">🎤</div>
            <div class="brand-text"><div>KORTC</div><div class="sub">${t('brand_sub')}</div></div>
          </div>
          <div class="spacer"></div>
          <button class="icon-btn" onClick=${() => setLangOpen((v) => !v)} title="Language">🌐</button>
        </header>

        ${langOpen ? html`<div class="lang-menu">
          ${[['zh-CN', '🇨🇳', '简体中文'], ['en', '🇬🇧', 'English']].map(([code, flag, label]) => html`
            <button key=${code} class=${lang === code ? 'active' : ''} onClick=${() => { changeLang(code); setLangOpen(false); }}>
              <span>${flag}</span>${label}${lang === code ? ' ✓' : ''}</button>`)}
        </div>` : null}

        <div class="content">
          <${BrowseView} t=${t} posMap=${posMap} onAdd=${add} openYt=${openYt} />
          <aside class="stage-panel"><${Stage} ...${stageProps} /></aside>
        </div>

        <${MiniPlayer} t=${t} queue=${queue} bump=${bump} minimizing=${minimizing} onOpen=${() => setSheetOpen(true)} />

        <${PlayerSheet} open=${sheetOpen} onClose=${() => setSheetOpen(false)}>
          <${Stage} ...${stageProps} />
        <//>

        <${Toasts} items=${toasts} />

        ${confirm ? html`<div class="overlay" onClick=${() => setConfirm(null)}>
          <div class="dialog" onClick=${(e) => e.stopPropagation()}>
            <div class="dg-ic">${confirm.icon}</div><h3>${confirm.title}</h3><p>${confirm.msg}</p>
            <div class="dg-actions">
              <button class="dg-cancel" onClick=${() => setConfirm(null)}>${t('cancel')}</button>
              <button class=${'dg-ok ' + (confirm.danger ? 'danger' : '')} onClick=${confirm.onOk}>${confirm.ok}</button>
            </div>
          </div>
        </div>` : null}

        ${ytOpen ? html`<div class="overlay" onClick=${closeYt}>
          <div class="yt-modal" onClick=${(e) => e.stopPropagation()}>
            <div class="yt-head"><span>▶ ${t('yt_modal_title')}</span><span class="spacer"></span>
              <button class="q-btn danger" onClick=${closeYt}>✕</button></div>
            <${YtAddView} t=${t} onToast=${toast} initialUrl=${ytUrl} />
          </div>
        </div>` : null}
      </div>`;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
